<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d0c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="ONEVibe — governed AI workspaces powered by ONEComputer and OpenVTC." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/onevibe-mark.svg" type="image/svg+xml" />
    <script>
      (() => {
        try {
          const saved = localStorage.getItem('onevibe-theme')
          const preference = ['light', 'dark', 'system'].includes(saved) ? saved : 'dark'
          const theme = preference === 'system'
            ? (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : preference
          document.documentElement.dataset.theme = theme
          document.documentElement.dataset.themePreference = preference
          document.documentElement.style.colorScheme = theme
          document.querySelector('meta[name="theme-color"]').content = theme === 'dark' ? '#0b0d0c' : '#f5f7f5'
        } catch { /* Use the dark CSS default when storage is unavailable. */ }
      })()
    </script>
    <title>ONEVibe — Governed AI Workspace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
